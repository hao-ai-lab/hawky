name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  checks: write
  contents: read

jobs:
  test:
    name: Unit, Integration & Web Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            web/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock', 'web/bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests
        run: |
          mkdir -p test-results
          bun test --coverage --retry=2 --reporter=junit --reporter-outfile=test-results/unit.xml ./tests/test-*.ts ./tests/test-*.tsx

      - name: Integration tests
        run: bun test --coverage --reporter=junit --reporter-outfile=test-results/integration.xml ./tests/integration/*.ts

      - name: Install web dependencies
        run: cd web && bun install

      - name: Web build (includes TypeScript typecheck)
        run: cd web && bun run build

      - name: Web tests
        run: cd web && bunx vitest run --reporter=default --reporter=junit --outputFile=../test-results/web.xml

      - name: Test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Test Results
          path: test-results/*.xml
          reporter: java-junit

  e2e:
    name: E2E Tests
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install

      - name: E2E tests
        run: bun test --timeout 30000 --max-concurrency=1 ./tests/e2e-*.ts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
