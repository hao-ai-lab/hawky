name: PR Hygiene

on:
  pull_request:
    types: [opened, edited, reopened, synchronize, ready_for_review]

permissions:
  pull-requests: read

jobs:
  metadata:
    name: Title and body
    runs-on: ubuntu-latest
    steps:
      - name: Check PR metadata
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const title = pr?.title ?? "";
            const body = pr?.body ?? "";
            const titlePattern = /^(feat|fix|docs|test|refactor|chore|ci|build|perf|style|revert)(\([a-z0-9][a-z0-9._-]*\))?: .{1,72}$/;
            const requiredSections = [
              "## Summary",
              "## Validation",
              "## Limitations / Follow-ups",
            ];

            const errors = [];
            if (!titlePattern.test(title)) {
              errors.push(
                "PR title must match `type(scope): summary`, for example `feat(gateway): add app login wall`.",
              );
            }
            for (const section of requiredSections) {
              if (!body.includes(section)) {
                errors.push(`PR body is missing required section: ${section}`);
              }
            }
            if (/\[(codex|claude|ai)\]/i.test(title)) {
              errors.push("PR title should not include tool prefixes such as `[codex]`.");
            }

            if (errors.length) {
              core.setFailed(errors.join("\n"));
            } else {
              core.info("PR metadata looks good.");
            }
