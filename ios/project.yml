name: hawky
options:
  bundleIdPrefix: live
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
packages:
  SnapshotTesting:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: 1.17.0
  MetaWearablesDAT:
    url: https://github.com/facebook/meta-wearables-dat-ios
    exactVersion: 0.4.0
  swift-markdown-ui:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: 2.0.2
  pipecat-client-ios-openai-realtime-webrtc:
    path: ThirdParty/pipecat-client-ios-openai-realtime-webrtc
settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
schemes:
  hawky:
    build:
      targets:
        hawky: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - hawkyTests
        - hawkyUITests
targets:
  hawky:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: hawky
      - path: Shared
    info:
      path: hawky/Info.plist
      properties:
        CFBundleDisplayName: Hawky
        LSSupportsOpeningDocumentsInPlace: true
        UIFileSharingEnabled: true
        UILaunchScreen:
          UIColorName: LaunchBackground
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLName: "$(PRODUCT_BUNDLE_IDENTIFIER)"
            CFBundleURLSchemes:
              - hawky
        LSApplicationQueriesSchemes:
          - fb-viewapp
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedExternalAccessoryProtocols:
          - com.meta.ar.wearable
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSBluetoothAlwaysUsageDescription: "Hawky uses Bluetooth to detect paired glasses and route audio"
        NSCameraUsageDescription: "Hawky uses the camera to capture video alongside audio for archival."
        NSLocalNetworkUsageDescription: "Hawky connects to your local Hawky gateway for testing."
        NSMicrophoneUsageDescription: "Hawky records audio for recording, live sessions, and the glasses HFP mic"
        NSSupportsLiveActivities: true
        MWDAT:
          AppLinkURLScheme: "hawky://"
          ClientToken: "$(CLIENT_TOKEN)"
          MetaAppID: "$(META_APP_ID)"
          TeamID: "$(DEVELOPMENT_TEAM)"
          Analytics:
            OptOut: true
        NSLocationWhenInUseUsageDescription: "Hawky uses your location to trigger location-based intentions when you arrive at or leave a place."
        NSLocationAlwaysAndWhenInUseUsageDescription: "Hawky uses your location in the background to deliver timed intentions even when the app is closed."
        UIBackgroundModes:
          - audio
          - bluetooth-peripheral
          - external-accessory
          - location
        CFBundleIconName: AppIcon
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: live.hawky
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "5.10"
        # Exposes the ObjCExceptionCatcher shim to Swift so AVAudioEngine graph
        # mutations can recover from uncatchable Obj-C NSExceptions. (#673)
        SWIFT_OBJC_BRIDGING_HEADER: hawky/hawky-Bridging-Header.h
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        DEVELOPMENT_TEAM: NGS8R78A9C
        CODE_SIGNING_REQUIRED: YES
        CODE_SIGNING_ALLOWED: YES
        CODE_SIGN_ENTITLEMENTS: hawky/hawky.entitlements
    dependencies:
      - package: MetaWearablesDAT
        product: MWDATCore
      - package: MetaWearablesDAT
        product: MWDATCamera
      - package: swift-markdown-ui
        product: MarkdownUI
      - package: pipecat-client-ios-openai-realtime-webrtc
        product: PipecatClientIOSOpenAIRealtimeWebrtc
      - target: hawkyLockScreenWidget
        embed: true
  hawkyLockScreenWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: hawkyLockScreenWidget
        excludes:
          - Info.plist
      - path: Shared
    info:
      path: hawkyLockScreenWidget/Info.plist
      properties:
        CFBundleDisplayName: Hawky
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: live.hawky.lock-screen-widget
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.10"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        DEVELOPMENT_TEAM: NGS8R78A9C
        CODE_SIGNING_REQUIRED: YES
        CODE_SIGNING_ALLOWED: YES
        SKIP_INSTALL: NO
        APPLICATION_EXTENSION_API_ONLY: YES
        CODE_SIGN_ENTITLEMENTS: hawkyLockScreenWidget/hawkyLockScreenWidget.entitlements
  hawkyTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: hawkyTests
        excludes:
          - "Fixtures/**"
      - path: hawkyTests/Fixtures
        buildPhase: resources
        type: folder
    dependencies:
      - target: hawky
      - package: SnapshotTesting
        product: SnapshotTesting
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: live.hawkyTests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.10"
  hawkyUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: hawkyUITests
    dependencies:
      - target: hawky
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: live.hawkyUITests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.10"
